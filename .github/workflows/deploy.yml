name: CI/CD Build and Publish to GHCR

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/pel-matiasvaldivia/frigo-backend
  FRONTEND_IMAGE: ghcr.io/pel-matiasvaldivia/frigo-frontend
  WHATSAPP_IMAGE: ghcr.io/pel-matiasvaldivia/frigo-whatsapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      # ── WhatsApp Bot ──────────────────────────────────────────────────────────
      - name: Build and push WhatsApp Bot image
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp
          file: ./whatsapp/Dockerfile
          push: true
          tags: |
            ${{ env.WHATSAPP_IMAGE }}:latest
            ${{ env.WHATSAPP_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.WHATSAPP_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.WHATSAPP_IMAGE }}:buildcache,mode=max
